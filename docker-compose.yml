version: "3.9"

# ---------------------------------------------------------------------------
# LeadForge – top-level docker-compose.yml
# Starts: PostgreSQL, Temporal (via temporal/docker-compose.yml), and the API
# ---------------------------------------------------------------------------

services:
  # -------------------------------------------------------------------------
  # PostgreSQL database
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: leadforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leadforge_dev_password}
      POSTGRES_DB: leadforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadforge -d leadforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Temporal server (single-node dev mode)
  # -------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.24
    restart: unless-stopped
    ports:
      - "7233:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: leadforge
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-leadforge_dev_password}
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.26.2
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal

  # -------------------------------------------------------------------------
  # LeadForge API
  # -------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://leadforge:${POSTGRES_PASSWORD:-leadforge_dev_password}@postgres:5432/leadforge
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      TEMPORAL_HOST: temporal:7233
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Temporal worker
  # -------------------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.temporal.worker"]
    environment:
      DATABASE_URL: postgresql://leadforge:${POSTGRES_PASSWORD:-leadforge_dev_password}@postgres:5432/leadforge
      TEMPORAL_HOST: temporal:7233
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started

volumes:
  postgres_data:
